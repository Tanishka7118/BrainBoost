<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | BrainBoost</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Fraunces:opsz,wght@9..144,500;9..144,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/styles.css?v=1.0.1" />
</head>
<body class="auth-page">
  <div class="bg-pattern"></div>
  <section class="auth-card reveal-in">
    <h1>Welcome Back</h1>
    <p>Track study, measure progress, and revise smarter.</p>
    <form id="loginForm" class="stack">
      <label>Email<input type="email" name="email" required /></label>
      <label>Password<input type="password" name="password" required /></label>
      <button class="button" type="submit">Login</button>
    </form>
    <div id="loginMessage" class="message"></div>
    <p>New student? <a href="/register">Create an account</a></p>
  </section>
  <script src="/static/js/auth.js?v=1.0.1"></script>
</body>
</html>
