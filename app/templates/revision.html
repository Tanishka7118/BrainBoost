{% extends "base.html" %}
{% block content %}
<section class="dashboard-grid">
  <article class="card reveal-in">
    <h1>Revision Planner</h1>
    <p>Move from studying to long-term retention.</p>
    <form id="revisionForm" class="stack">
      <label>Topic<input type="text" name="topic" required /></label>
      <label>Confidence (1-5)<input type="number" name="confidence_level" min="1" max="5" value="3" /></label>
      <label>Next Review Date<input type="date" name="next_review_date" required /></label>
      <label>Notes<textarea name="notes" rows="3"></textarea></label>
      <button class="button" type="submit">Create Revision Item</button>
    </form>
    <div id="revisionMessage" class="message"></div>
  </article>

  <article class="card reveal-in delay-2">
    <h2>Due Revision Items</h2>
    <div id="dueList" class="list"></div>
  </article>

  <article class="card reveal-in delay-3">
    <h2>Ask AI For Explanation</h2>
    <form id="explainForm" class="stack">
      <label>Question<textarea name="question" rows="3" required></textarea></label>
      <label>Your answer / confusion<textarea name="answer" rows="3" required></textarea></label>
      <button class="button" type="submit">Explain</button>
    </form>
    <pre id="explainOutput" class="ai-output"></pre>
  </article>
</section>
{% endblock %}

{% block scripts %}
<script src="/static/js/revision.js"></script>
{% endblock %}
