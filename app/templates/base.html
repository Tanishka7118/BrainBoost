<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title }} | BrainBoost</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Fraunces:opsz,wght@9..144,500;9..144,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/styles.css?v=1.0.0" />
</head>
<body>
  <div class="bg-pattern"></div>
  <header class="site-header">
    <a class="brand" href="/dashboard">BrainBoost</a>
    <nav>
      <a href="/dashboard" data-page-link="dashboard">Dashboard</a>
      <a href="/revision" data-page-link="revision">Revision</a>
      <div class="profile-menu" id="profileMenu">
        <button class="profile-trigger" id="profileTrigger" type="button" aria-haspopup="true" aria-expanded="false">
          <span class="profile-icon" aria-hidden="true">&#128100;</span>
          <span id="profileName">User</span>
        </button>
        <div class="profile-dropdown" id="profileDropdown" hidden>
          <button id="logoutBtn" class="dropdown-item" type="button">Logout</button>
        </div>
      </div>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <script src="/static/js/auth.js?v=1.0.1"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
