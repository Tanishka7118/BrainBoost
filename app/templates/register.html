<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register | BrainBoost</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Fraunces:opsz,wght@9..144,500;9..144,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/styles.css" />
</head>
<body class="auth-page">
  <div class="bg-pattern"></div>
  <section class="auth-card reveal-in">
    <h1>Create Account</h1>
    <p>Start building your study intelligence.</p>
    <form id="registerForm" class="stack">
      <label>Name<input type="text" name="name" required /></label>
      <label>Email<input type="email" name="email" required /></label>
      <label>Password<input type="password" name="password" minlength="6" required /></label>
      <button class="button" type="submit">Register</button>
    </form>
    <div id="registerMessage" class="message"></div>
    <p>Already have an account? <a href="/login">Login</a></p>
  </section>
  <script src="/static/js/auth.js"></script>
</body>
</html>
